name: VulneraX CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:

  # ─────────────────────────────────────────
  # STAGE 1: LINT
  # ─────────────────────────────────────────
  lint:
    name: Lint (flake8)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install linting dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8

      - name: Run flake8
        run: |
          flake8 . \
            --max-line-length=120 \
            --exclude=tests/,__pycache__/,.github/ \
            --ignore=W503,E302,E303,E501,W291,W293,W292,E241,E221,W391 \
            --count \
            --statistics || true
  # ─────────────────────────────────────────
  # STAGE 2: TEST
  # ─────────────────────────────────────────
  test:
    name: Unit Tests (pytest)
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pytest
        run: |
          pytest tests/ -v --tb=short

  # ─────────────────────────────────────────
  # STAGE 3: BUILD (Docker)
  # ─────────────────────────────────────────
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          docker build -t vulnerax:${{ github.sha }} .

    - name: Verify image starts correctly
        run: |
          docker run --rm -d --name vulnerax_test -p 8000:8000 vulnerax:${{ github.sha }}
          sleep 15
          curl --fail --retry 5 --retry-delay 3 --retry-connrefused http://localhost:8000/api/health || exit 1
          docker stop vulnerax_test

  # ─────────────────────────────────────────
  # STAGE 4: DEPLOY (Hugging Face Spaces)
  # ─────────────────────────────────────────
  deploy:
    name: Deploy to Hugging Face Spaces
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "misbah@vulnerax.com"
          git config --global user.name "MisbahSangi"
          git push https://ygjygfgb:$HF_TOKEN@huggingface.co/spaces/ygjygfgb/Vulnerax main --force

      - name: Deployment Complete
        run: echo "Hugging Face Spaces deployment triggered!"
